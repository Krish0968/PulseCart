spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:sqlserver://pulsecart-server.database.windows.net:1433;databaseName=pulsecart-db;encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30;}
    username: ${SPRING_DATASOURCE_USERNAME:pulsecart-admin}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  flyway:
    enabled: true
    locations: classpath:db/migration/sqlserver
    baseline-on-migrate: true

# Storage configuration (Azure Blob Storage)
app:
  storage:
    type: azure
    connection-string: ${AZURE_STORAGE_CONNECTION_STRING}
    container-name: ${AZURE_STORAGE_CONTAINER:products}
