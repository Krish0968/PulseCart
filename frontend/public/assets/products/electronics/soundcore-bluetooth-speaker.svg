<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="100%" height="100%">
    <defs>
      <linearGradient id="wallpaperGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color: #fb923c; stop-opacity: 1" />
        <stop offset="100%" style="stop-color: #1c1917; stop-opacity: 1" />
      </linearGradient>
      <linearGradient id="bookCoverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color: #1c1917; stop-opacity: 1" />
        <stop offset="100%" style="stop-color: #1c1917; stop-opacity: 1" />
      </linearGradient>
    </defs>
    <rect width="400" height="225" fill="#1c1917" rx="8"/><path d="M0 45 L400 45 M0 90 L400 90 M0 135 L400 135 M0 180 L400 180 M80 0 L80 225 M160 0 L160 225 M240 0 L240 225 M320 0 L320 225" stroke="white" stroke-width="1" opacity="0.04" />
      <!-- Speaker grill cylinder -->
      <rect x="130" y="40" width="140" height="150" rx="20" fill="#1e293b" stroke="#fb923c" stroke-width="4"/>
      <!-- Grid pattern inside speaker -->
      <pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse">
        <circle cx="5" cy="5" r="1.5" fill="#334155"/>
      </pattern>
      <rect x="140" y="50" width="120" height="130" rx="12" fill="url(#grid)"/>
      <!-- Brand highlight band -->
      <rect x="130" y="160" width="140" height="8" fill="#fb923c"/>
    
    <text x="24" y="210" fill="white" font-size="10" font-family="sans-serif" font-weight="bold" opacity="0.3">ACOUSTICS</text>
  
  </svg>