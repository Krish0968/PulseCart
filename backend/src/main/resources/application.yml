spring:
  profiles:
    active: local
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        show_sql: false

# Springdoc OpenAPI Config
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# Spring Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always

# Security & JWT Configuration
app:
  jwt:
    # A base64-encoded HS256 secret key (minimum 256-bit)
    secret: ${JWT_SECRET:change-me-locally-before-running}
    # Token expiration time: 24 hours in milliseconds
    expiration-ms: 86400000
  storage:
    local-dir: C:/Users/Asus/.gemini/antigravity/scratch/pulsecart/backend/uploads
